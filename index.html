<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WODSTAR COMPETENCIAS</title>

<style>
body{
  background:black;
  color:white;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

h1{color:gold;}

#lista{
  width:100%;
  max-width:400px;
}

#precios{
  width:100%;
  max-width:520px;
  margin:30px 0 50px;
  padding:0 15px;
  box-sizing:border-box;
}

.precios-titulo{
  color:gold;
  text-align:center;
  margin-bottom:18px;
}

.servicio-competencia{
  background:#050505;
  border:2px solid #f6c400;
  border-radius:10px;
  padding:24px 18px;
  text-align:center;
  box-shadow:0 0 14px rgba(246,196,0,0.35);
}

.servicio-competencia h3{
  margin:0;
  font-size:1.3rem;
  color:white;
}

.btn-contratar{
  margin-top:16px;
  width:100%;
  font-weight:bold;
  font-size:1rem;
  padding:14px;
}

.modal-bg{
  z-index:10000;
}

.modal.modal-planes{
  max-width:1100px;
  width:calc(100vw - 24px);
  max-height:calc(100vh - 24px);
  overflow:auto;
  box-sizing:border-box;
  padding:18px;
}

.modal-encabezado{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:15px;
  margin-bottom:15px;
}

.modal-encabezado h2{
  color:gold;
  margin:0;
}

.btn-cerrar{
  min-width:42px;
  font-weight:bold;
}

.tabla-wrap{
  width:100%;
  overflow-x:auto;
}

.tabla-planes{
  width:100%;
  min-width:860px;
  border-collapse:collapse;
  background:#050505;
  table-layout:fixed;
}

.tabla-planes th,
.tabla-planes td{
  border:1px solid #333;
  padding:16px;
  text-align:left;
  vertical-align:top;
  line-height:1.45;
}

.tabla-planes th{
  color:gold;
  background:#111;
  text-align:center;
}

.tabla-planes td:first-child{
  color:#f6c400;
  font-weight:bold;
  text-align:left;
}

.plan-precio{
  color:white;
  display:block;
  font-size:1.25rem;
  font-weight:bold;
  text-align:center;
}

.beneficios-lista{
  margin:0;
  padding-left:18px;
}

.beneficios-lista li{
  margin-bottom:8px;
}

.extra-foto{
  border:1px solid #f6c400;
  border-radius:8px;
  margin-top:16px;
  padding:14px;
  text-align:center;
  background:#0b0b0b;
  line-height:1.4;
}

.extra-foto strong{
  color:gold;
}

.acciones-planes{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:18px;
  flex-wrap:wrap;
}

.btn-contactar{
  display:inline-block;
  background:#25d366;
  color:black;
  padding:12px 18px;
  border-radius:5px;
  font-weight:bold;
  text-decoration:none;
}

.competencia{
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.competencia div{
  cursor:pointer;
  margin-bottom:10px;
}

button{
  padding:10px;
  background:gold;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

/* MODAL */
.modal-bg{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal{
  background:#111;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  width:90%;
}

input,select{
  padding:10px;
  width:90%;
  border-radius:5px;
  border:none;
}

/* WHATSAPP */
#chatBox{
  position:fixed;
  bottom:20px;
  right:20px;
  width:280px;
  max-height:400px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:9999;
}

.mensaje-wa{
  display:flex;
  align-items:flex-end;
  gap:8px;
  opacity:0;
  transform:translateY(20px);
  transition:all 0.4s ease;
}

.mensaje-wa.show{
  opacity:1;
  transform:translateY(0);
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:gold;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:black;
}

.burbuja{
  background:#1f2c34;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  max-width:200px;
  font-size:0.85rem;
  position:relative;
}

.burbuja::after{
  content:"";
  position:absolute;
  left:-6px;
  bottom:5px;
  width:10px;
  height:10px;
  background:#1f2c34;
  transform:rotate(45deg);
}

.burbuja a{
  color:#4fc3f7;
  text-decoration:underline;
}

.hora{
  font-size:0.7rem;
  color:#aaa;
  margin-top:5px;
  text-align:right;
}
.competencia{
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.botones{
  display:flex;
  gap:10px;
  justify-content:center;
}

.botones button{
  flex:1;
}

@media (max-width:760px){
  #precios{
    max-width:100%;
  }

  .modal.modal-planes{
    padding:14px;
  }

  .tabla-planes{
    min-width:720px;
  }

  .tabla-planes th,
  .tabla-planes td{
    padding:12px;
    font-size:0.92rem;
  }
}
</style>
</head>

<body>

<h1>WODSTARS COMPETENCIAS</h1>

<div id="lista"></div>
<section id="precios">
  <div class="servicio-competencia">
    <h3>Servicio para competencias WODSTAR</h3>
    <button class="btn-contratar" onclick="mostrarPlanes()">
      Contratar este servicio para tu competencia
    </button>
  </div>
</section>
<div id="modal"></div>
<div id="chatBox"></div>

<script>

// COMPETENCIAS
const competencias = [
  {
    nombre:"Competencia Enero",
    archivo:"competencia1.html",
    banco:"BBVA",
    cuenta:"1234567890",
    clabe:"012345678901234567",
    costos:{
      "Principiante Hombre":"$400 MXN",
      "Principiante Mujer":"$400 MXN",
      "Intermedio Hombre":"$500 MXN",
      "Intermedio Mujer":"$500 MXN",
      "Avanzado Hombre":"$600 MXN",
      "Avanzado Mujer":"$600 MXN"
    }
  },
   {
    nombre:"MOONLIGHT GAMES ",
    archivo:"competencia2.html",
    banco:"No disponibe ",
    cuenta:"No disponibe",
    clabe:"Comunicate con el staff de competencia",
    costos:{
      "Principiante Hombre":"$ MXN",
      "Principiante Mujer":"$ MXN",
      "Intermedio Hombre":"$ MXN",
      "Intermedio Mujer":"$MXN",
      "Avanzado Hombre":"$MXN",
      "Avanzado Mujer":"$XN"
    }
  }

];
 
// RENDER
let html="";
competencias.forEach(c=>{
html+=`
<div class="competencia">

  <div onclick="location.href='${c.archivo}'">
    ${c.nombre}
  </div>

  <button onclick="location.href='${c.archivo}'">
    🏆 Ver posiciones
  </button>

  <button onclick='inscribir(${JSON.stringify(c)})'>
    INSCRIBIRSE
  </button>

</div>
`;
});
lista.innerHTML=html;

// INSCRIBIR
function inscribir(comp){
  modal.innerHTML=`
  <div class="modal-bg" onclick="cerrar()">
    <div class="modal" onclick="event.stopPropagation()">

      <h2>${comp.nombre}</h2>

      <input id="nombre" placeholder="Nombre completo"><br><br>

      <select id="categoria">
        <option>Principiante Hombre</option>
        <option>Principiante Mujer</option>
        <option>Intermedio Hombre</option>
        <option>Intermedio Mujer</option>
        <option>Avanzado Hombre</option>
        <option>Avanzado Mujer</option>
      </select><br><br>

      <button onclick='generarRegistro(${JSON.stringify(comp)})'>Continuar</button>

    </div>
  </div>`;
}

function cerrar(){ modal.innerHTML=""; }

function mostrarPlanes(){
  const mensaje = encodeURIComponent("Quiero cotizar mi competencia en wodsts");
  const whatsapp = `https://wa.me/525636501351?text=${mensaje}`;

  modal.innerHTML=`
  <div class="modal-bg" onclick="cerrar()">
    <div class="modal modal-planes" onclick="event.stopPropagation()">
      <div class="modal-encabezado">
        <h2>Planes WODSTAR</h2>
        <button class="btn-cerrar" onclick="cerrar()">X</button>
      </div>

      <div class="tabla-wrap">
        <table class="tabla-planes">
          <thead>
            <tr>
              <th>Plan</th>
              <th>START</th>
              <th>PRO</th>
              <th>ELITE</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Precio</td>
              <td><span class="plan-precio">$950 MXN</span></td>
              <td><span class="plan-precio">$1500 MXN</span></td>
              <td><span class="plan-precio">$1650 MXN</span></td>
            </tr>
            <tr>
              <td>Extra</td>
              <td colspan="3">
                <div class="extra-foto">
                  <strong>Agrega fotografo profesional en tu competencia</strong><br>
                  $1500 MXN extra por 120 fotos.
                </div>
              </td>
            </tr>
            <tr>
              <td>Tipo</td>
              <td>Plan basico</td>
              <td>Plan recomendado</td>
              <td>Plan premium</td>
            </tr>
            <tr>
              <td>Beneficios</td>
              <td>
                <ul class="beneficios-lista">
                  <li>Plataforma de resultados en tiempo real</li>
                  <li>Captura de scores</li>
                  <li>Hasta 100 atletas</li>
                  <li>Heats y logistica basica</li>
                  <li>5 modalidades de scoring</li>
                  <li>Soporte presencial</li>
                  <li>Staff en tu competencia</li>
                </ul>
              </td>
              <td>
                <ul class="beneficios-lista">
                  <li>Todo el plan START</li>
                  <li>Inscripcion desde la plataforma</li>
                  <li>Categorias ilimitadas</li>
                  <li>App para jueces</li>
                  <li>Entrega de memorias finales</li>
                  <li>Soporte prioritario</li>
                  <li>Redes sociales</li>
                  <li>Direccion de evento</li>
                  <li>Venta de entradas</li>
                </ul>
              </td>
              <td>
                <ul class="beneficios-lista">
                  <li>Todo el plan PRO</li>
                  <li>Personalizacion total del evento</li>
                  <li>Diseno grafico y branding</li>
                  <li>Estadisticas avanzadas</li>
                  <li>Integracion con patrocinadores</li>
                  <li>Respaldo en la nube</li>
                  <li>Publicaciones en redes sociales</li>
                </ul>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="acciones-planes">
        <a class="btn-contactar" href="${whatsapp}" target="_blank" rel="noopener">Contactar</a>
        <button onclick="cerrar()">Cerrar</button>
      </div>
    </div>
  </div>`;
}

// REGISTRO
function generarRegistro(comp){

  const nombre=document.getElementById("nombre").value;
  const categoria=document.getElementById("categoria").value;

  if(!nombre) return alert("Ingresa tu nombre");

  const monto = comp.costos?.[categoria] ?? "No definido";
  const tiempoFinal = Date.now()+15*60*1000;

  localStorage.setItem("registro",JSON.stringify({
    nombre,categoria,
    competencia:comp.nombre,
    banco:comp.banco,
    cuenta:comp.cuenta,
    clabe:comp.clabe,
    monto,tiempoFinal
  }));

  mostrarRegistro();
}

// MOSTRAR REGISTRO
function mostrarRegistro(){
  const data=JSON.parse(localStorage.getItem("registro"));
  if(!data)return;

  modal.innerHTML=`
  <div class="modal-bg">
    <div class="modal">

      <h2>Pre-registro</h2>
      <p><b>${data.nombre}</b></p>
      <p>${data.competencia}</p>
      <p>${data.categoria}</p>

      <hr>

      <h3>Transferencia</h3>
      <p>Banco: ${data.banco}</p>
      <p>Cuenta: ${data.cuenta}</p>
      <p>CLABE: ${data.clabe}</p>
      <p>Monto: ${data.monto}</p>

      <p id="timer"></p>

      <button onclick="enviarCorreo('${data.nombre}','${data.categoria}','${data.competencia}')">
        Enviar comprobante
      </button>

      <br><br>
      <button onclick="cancelar()">Cancelar</button>

    </div>
  </div>`;

  iniciarTimer(data.tiempoFinal);
}

// TIMER
function iniciarTimer(t){
  const i=setInterval(()=>{
    const r=t-Date.now();
    if(r<=0){
      clearInterval(i);
      timer.innerText="⛔ Expirado";
      localStorage.removeItem("registro");
      return;
    }
    let m=Math.floor(r/60000);
    let s=Math.floor((r%60000)/1000);
    timer.innerText=`Tiempo: ${m}:${s<10?"0":""}${s}`;
  },1000);
}

function cancelar(){
  localStorage.removeItem("registro");
  cerrar();
}

// CORREO
function enviarCorreo(n,c,comp){
  window.location.href=
  `mailto:wodstarssoporte@gmail.com?subject=Comprobante&body=Nombre:${n}%0ACategoria:${c}%0ACompetencia:${comp}`;
}

// WHATSAPP STYLE
const mensajesWA=[
  
 
  "📲 Síguenos: https://www.instagram.com/wodstarscores//",
  
  "📢 Responde esta encuesta y gana un descuento https://docs.google.com/forms/d/e/1FAIpQLSc4VS9NYqgB5hOnb7-PomnAQ77a-O_trD5M4FDhGe_3OlyMmQ/viewform?usp=header"
];

function hora(){
  let d=new Date();
  return d.getHours()+":"+(d.getMinutes()<10?"0":"")+d.getMinutes();
}

function mostrarMensajeWA(txt){

  const chat = document.getElementById("chatBox");

  // borrar mensaje anterior
  chat.innerHTML = "";

  const c = document.createElement("div");
  c.className = "mensaje-wa";

  const urlRegex = /(https?:\/\/[^\s]+)/g;
  const t = txt.replace(urlRegex, u => {
    return `<a href="${u}" target="_blank">${u}</a>`;
  });

  c.innerHTML = `
    <div class="avatar">W</div>
    <div class="burbuja">
      ${t}
      <div class="hora">${hora()}</div>
    </div>
  `;

  chat.appendChild(c);

  setTimeout(() => {
    c.classList.add("show");
  }, 100);

  // desaparecer
  setTimeout(() => {
    c.classList.remove("show");

    setTimeout(() => {
      if (chat.contains(c)) {
        c.remove();
      }
    }, 400);

  }, 7000);
}

function iniciarChatWA(){
  function loop(){
    setTimeout(()=>{
      const m=mensajesWA[Math.floor(Math.random()*mensajesWA.length)];
      mostrarMensajeWA(m);
      loop();
    },Math.random()*15000+10000);
  }
  loop();
}

// INIT
window.onload=()=>{
  if(localStorage.getItem("registro")){
    mostrarRegistro();
  }
  iniciarChatWA();
};

</script>

</body>
</html>
